services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root-change-me
      MYSQL_DATABASE: easy_points
      MYSQL_USER: easy_points
      MYSQL_PASSWORD: change-me
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./mysql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "3307:3306"

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  api:
    image: node:24-alpine
    working_dir: /workspace/apps/api
    command: sh -c "npm install --omit=dev --workspaces=false --package-lock=false && node src/server.js"
    env_file:
      - ../.env.example
      - ../.env
    volumes:
      - ../:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ../apps/admin-web/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mysql-data:
